<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Favicon -->
    <link rel="icon" type="image/jpeg" href="/src/assets/logofavicon.png" />
    <link rel="apple-touch-icon" href="/src/assets/logofavicon.png" />
    <link rel="shortcut icon" href="/src/assets/logofavicon.png" />
    <!-- Título da página - Aparece na aba do navegador -->
    <title>Delicatta Joalheria | Joias Exclusivas</title>

    <!-- Descrição para SEO -->
    <meta
      name="description"
      content="Delicatta Joalheria - Descubra nossa coleção exclusiva de joias artesanais em ouro, prata e aço. Brincos, alianças, pulseiras e colares com design elegante."
    />
    <meta name="author" content="Delicatta Joalheria" />
    <meta
      name="keywords"
      content="joalheria, joias, ouro, prata, aço, brincos, alianças, pulseiras, colares, joias artesanais"
    />

    <!-- Open Graph - Para compartilhamento em redes sociais -->
    <meta
      property="og:title"
      content="Delicatta Joalheria | Joias Exclusivas"
    />
    <meta
      property="og:description"
      content="Descubra nossa coleção exclusiva de joias artesanais em ouro, prata e aço."
    />
    <meta property="og:type" content="website" />
    <meta
      property="og:image"
      content=""
    />

    <!-- Twitter Cards -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Delicatta Joalheria" />
    <meta
      name="twitter:description"
      content="Joias exclusivas com design elegante."
    />
    <meta
      name="twitter:image"
      content="https://lovable.dev/opengraph-image-p98pqg.png"
    />

    <!-- Fontes do Google - Playfair Display para títulos elegantes -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600;700&family=Inter:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
